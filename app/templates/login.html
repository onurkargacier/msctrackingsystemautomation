<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş — MSC Takip</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #eef1f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 1.5rem; color: #1a3c6e; font-weight: 700; }
    .logo p { color: #6b7a8d; font-size: 0.875rem; margin-top: 4px; }
    label { display: block; font-size: 0.85rem; font-weight: 500; color: #4a5568; margin-bottom: 5px; }
    input[type=text], input[type=password] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d1d9e0;
      border-radius: 7px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 16px;
    }
    input:focus { border-color: #1a3c6e; }
    .btn {
      width: 100%;
      padding: 11px;
      background: #1a3c6e;
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn:hover { background: #15315a; }
    .error {
      background: #fff0f0;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 0.875rem;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>MSC Takip</h1>
      <p>Kurumsal konşimento takip sistemi</p>
    </div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <label for="username">Kullanıcı Adı</label>
      <input type="text" id="username" name="username" autocomplete="username" required autofocus>
      <label for="password">Şifre</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
      <button class="btn" type="submit">Giriş Yap</button>
    </form>
  </div>
</body>
</html>
