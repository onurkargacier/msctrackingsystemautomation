name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları kur
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi beautifulsoup4 certifi pyinstaller

      - name: EXE üret (PyInstaller)
        shell: python
        run: |
          import subprocess, sys
          cmd = [
              sys.executable, "-m", "PyInstaller",
              "--onefile",
              "--windowed",
              "--name", "MSCTakip",
              "--collect-all", "curl_cffi",
              "--collect-all", "certifi",
              "--add-data", "src;src",        # msc_scraper.py bundle'a gir
              "--hidden-import", "msc_scraper",
              "--hidden-import", "bs4",
              "--hidden-import", "tkinter",
              "--hidden-import", "tkinter.ttk",
              "--hidden-import", "tkinter.scrolledtext",
              "--hidden-import", "sqlite3",
              "--hidden-import", "re",
              "main.py",
          ]
          subprocess.run(cmd, check=True)

      - name: EXE'yi artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: MSCTakip-Windows
          path: dist/MSCTakip.exe
          retention-days: 30

      - name: GitHub Release oluştur (sadece tag push'ta)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MSCTakip.exe
          name: "MSC Takip ${{ github.ref_name }}"
          body: |
            ## MSC Konşimento Takip — Windows Uygulaması

            ### Kurulum
            1. `MSCTakip.exe` dosyasını indirin
            2. Çift tıklayın — direkt açılır, ek kurulum gerekmez

            ### Veriler
            `%APPDATA%\MSCTakip\data.db`
