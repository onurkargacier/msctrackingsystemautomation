name: Build Windows EXE

on:
  workflow_dispatch:          # Elle tetikleme
  push:
    tags:
      - "v*"                  # v1.0, v1.1 gibi tag'lerde otomatik

permissions:
  contents: write             # Release oluşturmak için

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pyinstaller-hooks-contrib

      - name: EXE üret (PyInstaller)
        shell: python
        run: |
          import subprocess, sys, os, playwright
          from pathlib import Path

          # Playwright driver binary'sini bul (platform-safe path)
          driver = Path(playwright.__file__).parent / "driver" / "playwright.exe"
          print(f"Playwright driver: {driver}")
          print(f"Driver exists: {driver.exists()}")

          cmd = [
              sys.executable, "-m", "PyInstaller",
              "--onefile",
              "--windowed",
              "--name", "MSCTakip",
              "--hidden-import", "tkinter",
              "--hidden-import", "tkinter.ttk",
              "--hidden-import", "tkinter.scrolledtext",
              "--hidden-import", "playwright",
              "--hidden-import", "playwright.async_api",
              "--hidden-import", "playwright.sync_api",
              "--hidden-import", "playwright._impl._api_types",
              "--hidden-import", "playwright._impl._browser",
              "--hidden-import", "playwright._impl._browser_context",
              "--hidden-import", "playwright._impl._page",
              "--hidden-import", "playwright._impl._driver",
              "--hidden-import", "sqlite3",
              "--hidden-import", "asyncio",
              "--hidden-import", "requests",
              "--hidden-import", "importlib.util",
          ]

          # Playwright driver varsa ekle
          if driver.exists():
              cmd += ["--add-binary", f"{driver}:playwright/driver"]

          cmd.append("bootstrap/loader.py")

          result = subprocess.run(cmd, check=True)

      - name: EXE'yi artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: MSCTakip-Windows
          path: dist/MSCTakip.exe
          retention-days: 30

      - name: GitHub Release oluştur (sadece tag push'ta)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MSCTakip.exe
          name: "MSC Takip ${{ github.ref_name }}"
          body: |
            ## MSC Konşimento Takip — Windows Uygulaması

            ### Kurulum
            1. `MSCTakip.exe` dosyasını indirin
            2. Çift tıklayın — ilk açılışta internet bağlantısı gerekir (Playwright Chromium indirir, ~150 MB)
            3. Sonraki açılışlarda internet gerekmez

            ### Veriler
            Konşimento listesi ve sonuçlar bilgisayarınızda saklanır:
            `%APPDATA%\MSCTakip\data.db`
