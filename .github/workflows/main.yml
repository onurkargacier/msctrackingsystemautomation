name: MSC ETA Tracking Automation

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    concurrency:
      group: msctracking-${{ github.ref }}
      cancel-in-progress: false

    env:
      CONCURRENCY: "2"
      DEBUG_EVENTS: "0"

    steps:
      - name: Repoyu klonla
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Sistem bagimlilikları kur
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 libnss3 libatk-bridge2.0-0 libcups2 libxss1 \
            libgbm1 libgtk-3-0 libasound2 libx11-6 libxcb1 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libdbus-1-3 libxkbcommon0 \
            libatspi2.0-0 libdrm2 libpango-1.0-0 libcairo2 ca-certificates \
            fonts-liberation curl unzip
          sudo rm -rf /var/lib/apt/lists/*

      - name: Python bagimlilikları kur
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Scripti calistir
        env:
          CONCURRENCY: ${{ env.CONCURRENCY }}
          DEBUG_EVENTS: ${{ env.DEBUG_EVENTS }}
        run: |
          set -euo pipefail
          python src/main.py

      - name: GitHub Pages'e deploy et
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          commit_message: "chore: rapor guncellendi"
