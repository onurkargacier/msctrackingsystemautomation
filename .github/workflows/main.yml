name: MSC ETA Tracking System

on:

  workflow_dispatch:

  schedule:

    - cron: '0 8 * * *' # Her gün sabah 08:00'de çalışır (UTC)

jobs:

  run-tracker:

    runs-on: ubuntu-latest

    steps:

      - name: Repo'yu klonla

        uses: actions/checkout@v3

      - name: Python 3.10 kur

        uses: actions/setup-python@v4

        with:

          python-version: '3.10'

      - name: Playwright bağımlılıklarını yükle

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

          playwright install --with-deps

      - name: Ortam değişkeni olarak GOOGLE_CREDENTIALS yaz

        run: |

          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > google_credentials.json

        shell: bash

      - name: Scripti çalıştır

        run: python src/main.py

        env:

          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
 
