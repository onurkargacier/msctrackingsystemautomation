name: MSC ETA Tracking Automation

on:
  workflow_dispatch:
  schedule:
    # TR saatleri: 08:00–17:00  =>  UTC: 05:00–14:00
    - cron: '0 5 * * *'   # 08:00 TR
    - cron: '0 6 * * *'   # 09:00 TR
    - cron: '0 7 * * *'   # 10:00 TR
    - cron: '0 8 * * *'   # 11:00 TR
    - cron: '0 9 * * *'   # 12:00 TR
    - cron: '0 10 * * *'  # 13:00 TR
    - cron: '0 11 * * *'  # 14:00 TR
    - cron: '0 12 * * *'  # 15:00 TR
    - cron: '0 13 * * *'  # 16:00 TR
    - cron: '0 14 * * *'  # 17:00 TR

jobs:
  run-script:
    runs-on: ubuntu-22.04

    steps:
      - name: Reposu klonla
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Preflight secrets check
        run: |
          set -euo pipefail
          : "${GOOGLE_CREDENTIALS:?GOOGLE_CREDENTIALS missing. Add it in Actions secrets.}"
          if [ -z "${SPREADSHEET_ID:-}" ]; then
            echo "SPREADSHEET_ID yok; koddaki FALLBACK kullanılmayacak. Lütfen secrets'a ekleyin."
          else
            echo "SPREADSHEET_ID mevcut."
          fi
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}

      - name: credentials.json oluştur
        run: |
          set -euo pipefail
          echo "${GOOGLE_CREDENTIALS}" > credentials.json
          python - <<'PY'
import json; j=json.load(open("credentials.json")); print("Service account:", j.get("client_email","<unknown>"))
PY
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Sistem bağımlılıklarını kur
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 libnss3 libatk-bridge2.0-0 libcups2 libxss1 \
            libgbm1 libgtk-3-0 libasound2 libx11-6 libxcb1 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libdbus-1-3 libxkbcommon0 \
            libatspi2.0-0 libdrm2 libpango-1.0-0 libcairo2 ca-certificates \
            fonts-liberation curl unzip
          sudo rm -rf /var/lib/apt/lists/*

      - name: Python bağımlılıklarını kur
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Scripti çalıştır
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          set -euo pipefail
          python src/main.py
