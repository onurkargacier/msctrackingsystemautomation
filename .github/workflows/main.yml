name: MSC ETA Günlük Takip

on:

  schedule:

    - cron: '0 6 * * *'  # Her gün saat 06:00'da UTC (Türkiye saatiyle 09:00)

  workflow_dispatch:      # Manuel tetikleme opsiyonu

jobs:

  run-scraper:

    runs-on: ubuntu-latest

    steps:

      - name: Kod deposunu klonla

        uses: actions/checkout@v4

      - name: Python ortamını kur

        uses: actions/setup-python@v5

        with:

          python-version: '3.10'

      - name: Gereken kütüphaneleri yükle

        run: |

          python -m pip install --upgrade pip

          pip install -r src/requirements.txt

          playwright install chromium

      - name: Google Credentials dosyasını oluştur

        run: echo "${{ secrets.GOOGLE_CREDENTIALS }}" > src/google_credentials.json

        env:

          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Scraper'ı çalıştır

        run: python src/main.py
 
